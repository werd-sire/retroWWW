<meta name="keywords" content="tamagotchi,virtual pet,bandai,digital pet,90s toys,keychain,pixel pet,care guide">
<script language="JavaScript">
<!--
alert("🥚 WELCOME TO TAMAGOTCHI PARADISE! 🥚\n\nYou've entered the most RADICAL virtual pet sanctuary on the web!\n\nPrepare for MAXIMUM Tamagotchi obsession! 🐣💖");

// Current pet status
var currentPet = {
    name: "Mimitchi Jr.",
    age: 47,
    happiness: 85,
    hunger: 60,
    discipline: 75,
    weight: 35,
    generation: 3,
    alive: true,
    daysSinceHatched: 0
};

function updatePetStatus() {
    currentPet.daysSinceHatched++;
    currentPet.age++;
    currentPet.hunger -= Math.floor(Math.random() * 5) + 1;
    currentPet.happiness -= Math.floor(Math.random() * 3) + 1;
    
    if(currentPet.hunger < 0) currentPet.hunger = 0;
    if(currentPet.happiness < 0) currentPet.happiness = 0;
    
    // Death conditions (authentic Tamagotchi cruelty)
    if(currentPet.hunger <= 10 && currentPet.happiness <= 10) {
        currentPet.alive = false;
        alert("💀 OH NO! YOUR TAMAGOTCHI HAS DIED! 💀\n\n" +
              currentPet.name + " lived for " + currentPet.daysSinceHatched + " days!\n\n" +
              "Cause of death: Neglect and starvation\n" +
              "😭 Another angel gains its wings... 😭\n\n" +
              "Press F to pay respects! Check the Pet Cemetery for memorial!");
        return;
    }
    
    if(document.getElementById) {
        var statusDiv = document.getElementById('petStatus');
        if(statusDiv && currentPet.alive) {
            statusDiv.innerHTML = 
                "<b>" + currentPet.name + "</b><br>" +
                "Age: " + currentPet.age + " hours<br>" +
                "Days Alive: " + currentPet.daysSinceHatched + "<br>" +
                "Hunger: " + currentPet.hunger + "%<br>" +
                "Happy: " + currentPet.happiness + "%<br>" +
                "Weight: " + currentPet.weight + " oz";
        }
    }
}

function feedPet() {
    if(currentPet.alive) {
        currentPet.hunger += 20;
        currentPet.weight += 2;
        if(currentPet.hunger > 100) currentPet.hunger = 100;
        alert("🍎 FED " + currentPet.name + "! 🍎\n\nYour pet is happier and heavier!\nHunger: " + currentPet.hunger + "%\nWeight: " + currentPet.weight + " oz");
        updatePetStatus();
    } else {
        alert("💀 You cannot feed the dead! 💀\nVisit the Pet Cemetery to honor your fallen friend!");
    }
}

function playWithPet() {
    if(currentPet.alive) {
        currentPet.happiness += 15;
        currentPet.weight -= 1;
        if(currentPet.happiness > 100) currentPet.happiness = 100;
        alert("🎮 PLAYED WITH " + currentPet.name + "! 🎮\n\nYour pet is much happier!\nHappiness: " + currentPet.happiness + "%\nWeight: " + currentPet.weight + " oz");
        updatePetStatus();
    } else {
        alert("💀 The dead cannot play! 💀\nOnly memories remain...");
    }
}

function petCareAdvice() {
    alert("🐣 KEVIN'S PRO TAMAGOTCHI TIPS! 🐣\n\n" +
          "💡 NEVER let hunger drop below 20%!\n" +
          "💡 Play games to lose weight but gain happiness!\n" +
          "💡 Discipline only when they're being naughty!\n" +
          "💡 Check on them every 30 minutes or THEY DIE!\n" +
          "💡 Turn off sound at school (teachers hate beeping!)\n" +
          "💡 Some say pausing prevents aging (I don't cheat!)\n" +
          "💡 Different care = different evolutions!\n\n" +
          "Remember: Your Tamagotchi DEPENDS on you! 💖");
}

function tamagotchiHistory() {
    alert("📚 TAMAGOTCHI HISTORICAL FACTS! 📚\n\n" +
          "🥚 Invented in Japan by Bandai in 1996!\n" +
          "🌍 Over 40 MILLION sold worldwide!\n" +
          "🏫 Banned from most schools (TOO AWESOME!)\n" +
          "📺 Had their own TV show and comics!\n" +
          "💰 Some rare ones sell for $500+ on eBay!\n" +
          "🎭 Name means 'lovable egg' in Japanese!\n" +
          "🔬 Based on virtual pet concept from 80s!\n" +
          "🌟 Changed the world FOREVER!\n\n" +
          "Fun fact: I have 47 different versions! 🤓");
}

// Pet evolution simulator
function checkEvolution() {
    if(currentPet.alive && currentPet.age > 72) {
        var evolutions = ["Mimitchi", "Ginjirotchi", "Kuchipatchi", "Nyorotchi", "Tarakotchi", "Kusatchi"];
        var evolved = evolutions[Math.floor(Math.random() * evolutions.length)];
        alert("🎉 EVOLUTION TIME! 🎉\n\n" + currentPet.name + " has evolved into " + evolved + "!\n\n" +
              "This is based on your care patterns:\n" +
              "Final Hunger Level: " + currentPet.hunger + "%\n" +
              "Final Happiness: " + currentPet.happiness + "%\n" +
              "Days Cared For: " + currentPet.daysSinceHatched + "\n\n" +
              "Congratulations on raising a beautiful digital life! 🌟");
        currentPet.name = evolved;
    } else if(!currentPet.alive) {
        alert("💀 Dead pets cannot evolve! 💀\nOnly memories evolve into sadness...");
    } else {
        alert("⏰ Not ready to evolve yet! ⏰\nBe patient, young grasshopper!");
    }
}

// Start the pet life cycle
setInterval("updatePetStatus()", 30000); // Update every 30 seconds (accelerated time!)

// Animated pet
var petFrames = ["🥚", "🐣", "🐤", "🐥", "🐦"];
var currentFrame = 0;
function animatePet() {
    if(document.getElementById && currentPet.alive) {
        var petDisplay = document.getElementById('petAnimation');
        if(petDisplay) {
            petDisplay.innerHTML = petFrames[currentFrame];
            currentFrame = (currentFrame + 1) % petFrames.length;
        }
    }
}
setInterval("animatePet()", 1000);

window.status = "BEEP BEEP! Your Tamagotchi needs attention! Check Kevin's care guide!";
//-->
</script>
