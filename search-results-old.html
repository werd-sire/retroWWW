function getUrlParameter(name) {
    name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');

    var results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
}

function brokenLink(errorType) {
    if (errorType == "404 - Page Not Found") {
        alert("Error 404 - Page Not Found\n\nThe page you requested could not be found on this server.");
    } else if (errorType == "500 - Internal Server Error") {
        alert("Error 500 - Internal Server Error\n\nThe server encountered an internal error and was unable to complete your request.");

    } else if (errorType == "Domain Expired") {
        alert("Domain Expired\n\nThis domain name has expired and is no longer available.\n\nContact the webmaster for more information.");
    } else {
        alert("Error: " + errorType);
    }
}
